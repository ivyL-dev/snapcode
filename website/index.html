<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SnapCode</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: #0b0d12;
      color: #f5f7fb;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .wrap {
      width: min(720px, calc(100% - 40px));
    }
    h1 {
      font-size: clamp(2.5rem, 7vw, 5rem);
      margin: 0 0 16px;
      letter-spacing: -0.06em;
    }
    p {
      color: #b7c0cc;
      font-size: 1.05rem;
      line-height: 1.7;
      margin: 0;
      max-width: 42rem;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>SnapCode</h1>
    <p>An AI-native web and digital product company focused on interface systems, modern web experiences, and user-facing digital products.</p>
  </main>
</body>
</html>
